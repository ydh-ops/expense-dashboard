<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업비 이슈 및 회계 질의 관리</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); }
        .preserve-newlines {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, useRef } = React;

        // 구글 앱스 스크립트 배포 URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5IS-sr9Jd5qlYwCHeJkppCMgPa2267xBCuGWR0Czo0GJkO8jgl08GKBVVTvt2wmIb/exec";

        // 날짜 포맷 함수
        const getKSTDateString = (dateInput) => {
            const date = dateInput ? new Date(dateInput) : new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // 안전한 전역 Lucide 아이콘 렌더링 컴포넌트 (내부 import 구문 완전 제거)
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    try {
                        const svgString = window.lucide.createSvg({
                            name: name,
                            attrs: {
                                class: className,
                                width: size,
                                height: size,
                                stroke: 'currentColor',
                                'stroke-width': 2,
                                fill: 'none',
                                'stroke-linecap': 'round',
                                'stroke-linejoin': 'round'
                            }
                        });
                        
                        if (svgString instanceof SVGElement) {
                            iconRef.current.appendChild(svgString);
                        } else if (typeof svgString === 'string') {
                            iconRef.current.innerHTML = svgString;
                        }
                    } catch (e) {
                        console.error("아이콘 로드 실패:", name, e);
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" style={{ width: size, height: size, verticalAlign: 'middle' }} />;
        };

        // 메인 App 컴포넌트
        const App = () => {
            const [inquiries, setInquiries] = useState([]);
            const [categories, setCategories] = useState(["인건비", "직접비", "위탁사업비", "간접비"]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('전체');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const fetchData = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(SCRIPT_URL);
                    if (!response.ok) throw new Error(`서버 응답 오류 (상태: ${response.status})`);
                    
                    const result = await response.json();
                    
                    if (Array.isArray(result)) {
                        setInquiries(result);
                    } else if (result && typeof result === 'object') {
                        if (result.error) throw new Error(result.error);
                        setInquiries(Array.isArray(result.inquiries) ? result.inquiries : []);
                        if (Array.isArray(result.categories) && result.categories.length > 0) {
                            setCategories(result.categories);
                        }
                    }
                } catch (err) {
                    setError(err.message || "데이터를 가져오는 중 오류가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            const handleSave = async (formData) => {
                setLoading(true);
                const action = editingItem ? 'update' : 'insert';
                const data = {
                    ...formData,
                    '날짜': getKSTDateString(formData['날짜']),
                    ID: editingItem ? editingItem.ID : Date.now()
                };

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, data })
                    });
                    await fetchData();
                    setIsModalOpen(false);
                    setEditingItem(null);
                } catch (err) {
                    setError("데이터 저장에 실패했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            const confirmDelete = async () => {
                if (!deleteConfirmId) return;
                setLoading(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', data: { ID: deleteConfirmId } })
                    });
                    await fetchData();
                    setDeleteConfirmId(null);
                } catch (err) {
                    setError("데이터 삭제에 실패했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            const stats = useMemo(() => ({
                total: inquiries.length,
                completed: inquiries.filter(i => (i['상태'] || "").toString() === '완료').length,
                pending: inquiries.filter(i => (i['상태'] || "").toString() !== '완료').length,
            }), [inquiries]);

            const filteredInquiries = inquiries.filter(item => {
                const title = (item['제목'] || "").toString().toLowerCase();
                const content = (item['질의내용'] || "").toString().toLowerCase();
                const matchesSearch = title.includes(searchTerm.toLowerCase()) || content.includes(searchTerm.toLowerCase());
                const category = (item['비목'] || "기타").toString();
                const matchesCategory = filterCategory === '전체' || category === filterCategory;
                return matchesSearch && matchesCategory;
            });

            return (
                <div className="min-h-screen p-4 md:p-8 bg-slate-50">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row md:items-center justify-
